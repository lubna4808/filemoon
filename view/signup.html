<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css"
    rel="stylesheet"
/>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />

    <div class="bg-gray-500 min-h-screen flex justify-center items-center animate__animated animate__fadeIn">
    <div class="p-1.5 w-80 bg-white rounded-xl flex flex-col items-center gap-1 animate__animated animate__pulse">
        <div class="flex items-center gap-2">
            <i class="ri-contrast-2-fill text-5xl text-violet-700"></i>
            <h1 class="text-2xl font-semibold">Filemoon</h1>
        </div>

        <form class="w-full space-y-1">
            <div class="space-y-0.5">
                <label class="text-gray-500 text-sm block">Fullname</label>
                <input name="fullname" class="p-1.5 rounded border border-gray-300 w-full text-sm" 
                placeholder="Lubna khan"
                 required type="text" />
            </div>

            <div class="space-y-0.5">
                <label class="text-gray-500 text-sm block">Mobile</label>
                <input name="mobile" class="p-1.5 rounded border border-gray-300 w-full text-sm"
                 placeholder="5784939329" 
                 required type="number" />
            </div>

            <div class="space-y-0.5">
                <label class="text-gray-500 text-sm block">Email</label>
                <input name="email" class="p-1.5 rounded border border-gray-300 w-full text-sm" 
                placeholder="email@mail.com"
                 required type="email" />
            </div>

            <div class="space-y-0.5">
                <label class="text-gray-500 text-sm block">Password</label>
                <input name="password" class="p-1.5 rounded border border-gray-300 w-full text-sm" 
                placeholder="*********"
                 required type="password" />
            </div>

            <button class="p-2 rounded bg-violet-500 w-full text-white font-medium hover:bg-violet-600 text-sm">Sign up</button>
        </form>

        <div class="flex items-center gap-2 mt-1 text-sm">
            <div class="text-gray-500">Already have an account?</div>
           
            
            <a href="./index.html" class="text-green-500 font-medium">login</a>
        </div>
    </div>
</div>
